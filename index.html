<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Зарплата 2026</title>

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json" onerror="this.remove()">
  <meta name="theme-color" content="#F2F2F7" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <style>
    :root {
      /* Основные цвета */
      --primary: #007aff;
      --primary-gradient: linear-gradient(135deg, #007aff, #0056b3);
      --success: #34c759;
      --danger: #ff3b30;
      --warning: #ff9500;
      
      /* Фоны и текст */
      --bg: #F2F2F7; 
      --card-bg: #ffffff;
      --text: #1c1c1e; 
      --text-sec: #8e8e93; 
      --border-color: #e5e5ea;
      --input-bg: #F2F2F7;
      
      /* Эффекты */
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-float: 0 4px 12px rgba(0,0,0,0.1);
      --border-radius: 12px;
    }

    /* Темная тема */
    body.dark-theme {
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text: #ffffff;
      --text-sec: #98989d;
      --border-color: #38383a;
      --input-bg: #2c2c2e;
      --shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 0;
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      padding-bottom: 90px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }

    .container { 
      max-width: 600px; 
      margin: 0 auto; 
      padding: 16px 12px; 
      /* ИСПРАВЛЕНИЕ ДЛЯ IPHONE 16 PRO MAX: отступ сверху учитывает островок камеры */
      padding-top: max(20px, env(safe-area-inset-top));
    }

    /* Заголовки */
    h1, h2, h3 { margin: 0; text-align: center; letter-spacing: -0.5px; }
    h1 { 
      font-size: 26px; font-weight: 800; margin: 10px 0 20px; color: var(--text); 
      cursor: text; /* Показывает, что можно редактировать */
      padding: 5px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    h1:active { background: rgba(0,0,0,0.05); }
    h1:focus { outline: 2px solid var(--primary); background: rgba(0,0,0,0.05); }

    h2 { font-size: 20px; font-weight: 700; margin: 16px 0; }
    h3 { font-size: 14px; font-weight: 600; margin: 12px 0 8px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; }

    button { cursor: pointer; border: none; outline: none; font-family: inherit; -webkit-appearance: none; }
    
    /* ШАПКА */
    .top-controls {
      display: flex;
      justify-content: space-between; 
      align-items: center;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .theme-btn {
      background: var(--card-bg);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 10px; 
      font-size: 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .theme-btn:active { transform: scale(0.9); }

    .actions-group { display: flex; gap: 8px; }

    .backup-btn {
      background: var(--card-bg);
      color: var(--primary);
      height: 36px;
      padding: 0 14px; 
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .backup-btn:active { transform: scale(0.96); opacity: 0.8; }

    /* Кнопка Назад */
    .header-back-btn {
      background: transparent;
      color: var(--primary);
      padding: 6px 10px;
      margin-left: -12px; 
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    .header-back-btn:active { background: rgba(0,0,0,0.05); }

    /* Сетка месяцев */
    .months-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 380px) { .months-grid { grid-template-columns: 1fr; } }

    .month-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 10px;
      background: var(--card-bg);
      border-radius: 14px; 
      box-shadow: var(--shadow);
      color: var(--text);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      border: 1px solid rgba(0,0,0,0.02);
    }
    .month-btn:active { transform: scale(0.96); }
    
    /* ИЗМЕНЕНИЕ: Синий цвет названия месяца */
    .month-name { 
      font-size: 16px; font-weight: 700; margin-bottom: 2px; 
      color: var(--primary); 
    }
    
    .month-badge { font-size: 13px; color: var(--text-sec); font-weight: 500; }

    .month-header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .current-rate-btn {
      background: rgba(0, 122, 255, 0.1);
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 700;
    }

    /* Карточки */
    .item {
      background: var(--card-bg);
      padding: 12px;
      border-radius: var(--border-radius);
      margin: 8px 0;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }
    .dayoff-item { border-left: 4px solid var(--success); }
    .trip-item { border-left: 4px solid var(--primary); }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .item-title { font-weight: 700; font-size: 15px; display: flex; align-items: center; flex-wrap: wrap; line-height: 1.3; }
    .item-cost { font-weight: 800; font-size: 16px; text-align: right; color: var(--primary); }
    .item-sub { font-size: 13px; color: var(--text-sec); margin-top: 4px; font-weight: 500; }

    .weekend-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 149, 0, 0.1);
      color: var(--warning);
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 800;
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border-color);
    }
    .action-btn {
      padding: 6px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      flex: 1;
    }
    .action-btn.delete { background: rgba(255, 59, 48, 0.1); color: var(--danger); }

    /* Блоки итогов */
    .total-block {
      background: var(--card-bg);
      padding: 16px;
      border-radius: var(--border-radius);
      margin-top: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.02);
    }
    .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--text-sec); }
    .total-row span:last-child { color: var(--text); font-weight: 600; }
    
    .total-row.final { 
      margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border-color); 
      font-size: 18px; color: var(--primary); 
    }

    /* ИНПУТЫ */
    .input-group { margin-bottom: 12px; }
    .input-label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    input:not([type="hidden"]) {
      width: 100%;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 16px;
      color: var(--text);
      font-weight: 400;
      -webkit-appearance: none;
      transition: all 0.2s;
      line-height: 1.2;
    }
    input:focus { background: var(--card-bg); border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }

    /* FAB */
    .fab-container {
      position: fixed; bottom: 20px; left: 0; right: 0; padding: 0 16px;
      max-width: 600px; margin: 0 auto; pointer-events: none; z-index: 100;
    }
    .fab-row { display: flex; gap: 10px; pointer-events: auto; }
    .fab-btn {
      flex: 1; padding: 12px; border-radius: 14px; color: white; font-weight: 700;
      box-shadow: var(--shadow-float); display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 14px;
      background: var(--primary-gradient);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* МОДАЛЬНЫЕ ОКНА */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(5px); 
      -webkit-backdrop-filter: blur(5px);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 9999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }

    body.modal-open { overflow: hidden; position: fixed; width: 100%; }

    .modal.visible { opacity: 1; pointer-events: auto; }
    
    .modal-content {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 20px 20px 0 0;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 70vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
    }

    .modal.visible .modal-content {
      transform: translateY(0);
    }

    @media (min-width: 600px) {
      .modal { align-items: center; }
      .modal-content { border-radius: 20px; transform: translateY(20px); opacity: 0; max-height: 70vh; padding: 24px; }
      .modal.visible .modal-content { transform: translateY(0); opacity: 1; }
    }

    /* Toggle Button */
    .toggle-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 10px;
      border: 2px solid var(--border-color); border-radius: 10px;
      font-weight: 600; color: var(--text-sec);
      background: var(--input-bg);
      transition: all 0.2s;
      cursor: pointer; margin-bottom: 12px; font-size: 14px;
    }
    .toggle-btn:active { transform: scale(0.98); }
    .toggle-btn.active { border-color: var(--warning); background: rgba(255, 149, 0, 0.1); color: var(--warning); }
    .toggle-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--text-sec);
      margin-right: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--card-bg);
      transition: all 0.2s; flex-shrink: 0;
      font-size: 12px;
    }
    .toggle-btn.active .toggle-icon { border-color: var(--warning); background: var(--warning); color: white; border: none; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn-row button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 15px; }
    .btn-primary { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
    .btn-secondary { background: var(--input-bg); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; box-shadow: 0 4px 12px rgba(255,59,48,0.3); }

    .hidden { display: none !important; }

    /* --- Стили для Lite-версии --- */
    .trial-badge {
      background: var(--warning);
      color: #fff;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      vertical-align: middle; /* Adjusted for better alignment */
      margin-left: 6px; /* Adjusted spacing */
      box-shadow: 0 2px 4px 1px rgba(0, 0, 0, 0.05);
    }
    .limit-warning {
      color: var(--text-sec); 
      font-size: 13px;
      margin: -10px 0 15px 0; /* Adjusted margins */
      text-align: center;
    }
    .limit-warning .btn-primary {
      margin-top: 8px; /* Spacing for button inside warning */
      padding: 6px 12px;
      font-size: 13px;
    }
    .premium-modal-content {
        text-align: center;
        padding: 10px; /* Reduced padding for mobile */
    }
    .premium-modal-content h3 {
        color: var(--primary);
        margin-bottom: 10px;
    }
    .premium-modal-content p {
        margin-bottom: 15px;
        color: var(--text-sec);
        line-height: 1.4;
    }
    .premium-modal-content ul {
        list-style: disc; /* Use discs for list items */
        padding: 0;
        margin: 0 auto 20px auto;
        text-align: left;
        display: inline-block; /* To center the list itself */
        font-size: 14px;
        color: var(--text);
    }
    .premium-modal-content ul li {
        margin-bottom: 5px;
    }
    .premium-modal-content .btn-row {
        margin-top: 20px;
        justify-content: center;
    }
  </style>
</head>
<body>

  <div class="container" id="app"></div>
  
  <div id="fab-container" class="fab-container hidden">
    <div class="fab-row">
      <button class="fab-btn" onclick="openForm('trip')">➕ Поездка</button>
      <button class="fab-btn" style="background: linear-gradient(135deg, #34c759, #28a745);" onclick="openForm('dayoff')">➕ Выходной</button>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <input type="file" id="fileInput" style="display: none;" accept=".json" onchange="handleFileImport(this)" />

  <script>
    // Получаем название из хранилища или ставим дефолт
    let baseAppTitle = localStorage.getItem('app_title') || "Зарплата 2026"; // Изменено на baseAppTitle
    
    const PER_DIEM_RATE = 1400;
    const MIN_KM = 250;
    const months = [
      'Январь','Февраль','Март','Апрель','Май','Июнь',
      'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'
    ];

    let data = JSON.parse(localStorage.getItem('salary2026')) || {};
    let currentMonth = '';

    // --- ЛОГИКА LITE-ВЕРСИИ ---
    const TRIAL_LIMIT = 3; // Лимит поездок в месяц для Lite-версии
    let isPremium = localStorage.getItem('is_premium') === 'true'; // Статус полной версии
    // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

    const formatMoney = (num) => new Intl.NumberFormat('ru-RU').format(num) + ' ₽';
    
    // Сохранение названия
    function updateTitle(el) {
      // Удаляем любые badge-и для сохранения чистого названия
      const newTitle = el.innerText.replace(/<span.*?<\/span>/g, '').trim(); 
      if (newTitle) {
        baseAppTitle = newTitle; // Сохраняем базовое название
        localStorage.setItem('app_title', newTitle);
        updateAppDisplayTitle(); // Обновляем отображение названия везде
      }
    }
    
    // Новая функция для единообразного обновления заголовка приложения
    function updateAppDisplayTitle() {
        const h1Element = document.querySelector('h1[contenteditable]');
        if (h1Element) {
            h1Element.innerHTML = isPremium ? baseAppTitle : `${baseAppTitle} <span class="trial-badge">Lite</span>`;
        }
        document.title = isPremium ? baseAppTitle : `${baseAppTitle} Lite`;
    }

    // Предотвращаем перенос строки в заголовке при Enter
    function handleTitleEnter(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.target.blur(); // Снимаем фокус
      }
    }
    
    function save() {
      localStorage.setItem('salary2026', JSON.stringify(data));
    }

    function checkStorage() {
      try {
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        return true;
      } catch (e) {
        return false;
      }
    }

    function getMonthData(month) {
      let obj = data[month];
      if (!obj) {
        obj = { rate: 3870, items: [], advance: 0, salary: 0, bonus: 0 };
        data[month] = obj;
      } else if (Array.isArray(obj)) {
        obj = { rate: 3870, items: obj, advance: 0, salary: 0, bonus: 0 };
        data[month] = obj;
        save();
      }
      return obj;
    }

    function getFirstDay(dayStr) {
      if (!dayStr) return 999;
      const num = parseInt(dayStr.replace(/[^0-9].*$/, ''));
      return isNaN(num) ? 999 : num;
    }

    function isRange(dayStr) {
      return dayStr && (dayStr.includes('-') || dayStr.includes('–'));
    }

    function suggestNights(dayStr) {
      if (!isRange(dayStr)) return 0;
      const clean = dayStr.replace('–', '-');
      const parts = clean.split('-').map(p => p.trim());
      if (parts.length === 2) {
        const start = parseInt(parts[0]);
        const end = parseInt(parts[1]);
        if (!isNaN(start) && !isNaN(end)) {
          return end >= start ? end - start : 2;
        }
      }
      return 1;
    }

    function calculateDaysInDayoff(dayRange) {
      if (!dayRange) return 1;
      if (!dayRange.includes('-') && !dayRange.includes('–')) return 1;
      const parts = dayRange.replace('–', '-').split('-');
      const start = parseInt(parts[0]);
      const end = parseInt(parts[1]);
      if (!isNaN(start) && !isNaN(end) && end >= start) return (end - start) + 1;
      return 1;
    }

    function calcTrip(trip, rate) {
      const effectiveKM = trip.km ? Math.max(MIN_KM, trip.km) : 0;
      
      let storeBonusCoefficient = 0;
      const stores = trip.stores || 0;
      
      if (stores >= 5) {
        const paidCount = Math.floor((stores - 3) / 2);
        storeBonusCoefficient = paidCount * 0.1;
      }

      const coeff = 1 
        + (trip.isWeekend ? 1 : 0) 
        + effectiveKM / 250 
        + storeBonusCoefficient;

      return {
        cost: Math.round(coeff * rate),
        perDiem: trip.nights * PER_DIEM_RATE
      };
    }

    function renderMonthList() {
      currentMonth = '';
      document.getElementById('fab-container').classList.add('hidden');

      const isDark = document.body.classList.contains('dark-theme');
      const themeIcon = isDark ? '☀️' : '🌙';

      let html = `<h1 contenteditable="true" oninput="updateTitle(this)" onkeydown="handleTitleEnter(event)">${baseAppTitle}</h1>`;
      
      html += `
        <div class="top-controls">
          <button class="theme-btn" onclick="toggleTheme()">${themeIcon}</button>
          
          <div class="actions-group">
            <button class="backup-btn" onclick="exportData()">
              💾 <span style="display:none; @media(min-width:400px){display:inline;}">Сохранить</span>
            </button>
            <button class="backup-btn" onclick="triggerImport()">
              📂 <span style="display:none; @media(min-width:400px){display:inline;}">Загрузить</span>
            </button>
          </div>
        </div>
      `;

      html += `<div class="months-grid">`;
      months.forEach(m => {
        const mData = getMonthData(m);
        const total = mData.items.filter(t => t.type === 'trip')
                       .reduce((sum, t) => sum + calcTrip(t, mData.rate).cost, 0);
        html += `
          <button class="month-btn" onclick="showMonth('${m}')">
            <div class="month-name">${m}</div>
            ${total > 0 ? `<div class="month-badge">${formatMoney(total)}</div>` : '<div class="month-badge">—</div>'}
          </button>`;
      });
      html += `</div>`;
      
      document.getElementById('app').innerHTML = html;
      updateAppDisplayTitle(); // Обновляем заголовок после рендеринга сетки месяцев
    }

    function showMonth(month) {
      currentMonth = month;
      const monthData = getMonthData(month);
      const items = monthData.items;
      const rate = monthData.rate;
      const sortedItems = [...items].sort((a, b) => getFirstDay(a.dayRange) - getFirstDay(b.dayRange));

      let contentHtml = '';

      // --- ЛОГИКА LITE-ВЕРСИИ: Подсчет поездок и предупреждение о лимите ---
      const tripsInMonth = items.filter(t => t.type === 'trip').length;
      let limitWarningHtml = '';
      if (!isPremium) {
          const remainingTrips = TRIAL_LIMIT - tripsInMonth;
          if (remainingTrips > 0) {
              limitWarningHtml = `<p class="limit-warning">Осталось ${remainingTrips} ${remainingTrips === 1 ? 'поездка' : 'поездок'} в этом месяце.</p>`;
          } else {
              limitWarningHtml = `<p class="limit-warning" style="color:var(--danger);">Достигнут лимит (${TRIAL_LIMIT} поездок)! <button class="btn-primary" onclick="showPremiumModal()">Снять ограничение</button></p>`;
          }
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

      if (sortedItems.length === 0) {
        contentHtml = `<div style="text-align:center;color:var(--text-sec);padding:40px 0; opacity: 0.6;">Нет записей на этот месяц</div>`;
      } else {
        sortedItems.forEach(item => {
          if (item.type === 'dayoff') {
            const daysCount = calculateDaysInDayoff(item.dayRange);
            const daysText = daysCount > 1 ? ` (${daysCount} дн.)` : '';
            contentHtml += `
              <div class="item dayoff-item">
                <div class="item-header">
                  <div class="item-title">${item.dayRange}${daysText}</div>
                  <div class="item-cost" style="color:var(--success)">Выходной</div>
                </div>
                <div class="item-actions">
                  <button class="action-btn" onclick="openForm('dayoff', '${item.id}')">✏️ Изменить</button>
                  <button class="action-btn delete" onclick="confirmDelete('${item.id}')">🗑️ Удалить</button>
                </div>
              </div>`;
          } else {
            const r = calcTrip(item, rate);
            const weekendBadge = item.isWeekend ? `<span class="weekend-badge">Выходной x2</span>` : '';
            contentHtml += `
              <div class="item trip-item">
                <div class="item-header">
                  <div class="item-title">
                    ${item.dayRange} — ${item.location}
                    ${weekendBadge}
                  </div>
                  <div class="item-cost">${formatMoney(r.cost)}</div>
                </div>
                <div class="item-sub">
                   КМ: ${item.km || 0} • Точки: ${item.stores || 0} • Суточные: ${formatMoney(r.perDiem)}
                </div>
                <div class="item-actions">
                  <button class="action-btn" onclick="openForm('trip', '${item.id}')">✏️ Изменить</button>
                  <button class="action-btn delete" onclick="confirmDelete('${item.id}')">🗑️ Удалить</button>
                </div>
              </div>`;
          }
        });
      }

      let totalCost = 0, totalPerDiem = 0, totalDayoffs = 0;
      items.forEach(t => {
        if (t.type === 'trip') {
          const r = calcTrip(t, rate);
          totalCost += r.cost;
          totalPerDiem += r.perDiem;
        } else if (t.type === 'dayoff') {
          totalDayoffs += calculateDaysInDayoff(t.dayRange);
        }
      });

      const paymentsHtml = `
        <div class="total-block">
          <h3>Начислено</h3>
          <div class="input-group">
            <label class="input-label">Аванс (получено)</label>
            <input type="number" id="pay_advance" value="${monthData.advance || 0}" onchange="saveMonthlyPayments()" placeholder="0">
          </div>
          <div class="input-group">
            <label class="input-label">Зарплата (получено)</label>
            <input type="number" id="pay_salary" value="${monthData.salary || 0}" onchange="saveMonthlyPayments()" placeholder="0">
          </div>
          <div class="input-group">
            <label class="input-label">Премия / Прочее</label>
            <input type="number" id="pay_bonus" value="${monthData.bonus || 0}" onchange="saveMonthlyPayments()" placeholder="0">
          </div>
          <div class="total-row final" style="border-top:1px dashed var(--border-color); margin-top:12px;">
            <span>Всего получено:</span>
            <span id="total-received-sum" style="color: var(--success);">${formatMoney((monthData.advance||0) + (monthData.salary||0) + (monthData.bonus||0))}</span>
          </div>
        </div>
      `;

      const html = `
        <div class="month-header-controls">
          <button class="header-back-btn" onclick="renderMonthList()">← Назад</button>
          <button class="current-rate-btn" onclick="openRateModal()">⚙️ Ставка: ${rate}₽</button>
        </div>
        <h2>${month}</h2>
        ${limitWarningHtml} <!-- Отображаем предупреждение о лимите -->
        ${contentHtml}
        <div class="total-block">
          <div class="total-row"><span>Начислено за работу:</span> <span>${formatMoney(totalCost)}</span></div>
          <div class="total-row"><span>Суточные:</span> <span>${formatMoney(totalPerDiem)}</span></div>
          <div class="total-row" style="color: var(--success); font-weight: 600;">
            <span>Выходные (дни отдыха):</span> <span>${totalDayoffs}</span>
          </div>
          <div class="total-row final"><span>Итого к выплате:</span> <span>${formatMoney(totalCost + totalPerDiem)}</span></div>
        </div>
        ${paymentsHtml}
      `;

      document.getElementById('app').innerHTML = html;

      // --- ЛОГИКА LITE-ВЕРСИИ: Отключение FAB-кнопок при достижении лимита ---
      const fabContainer = document.getElementById('fab-container');
      if (fabContainer) {
          if (!isPremium && tripsInMonth >= TRIAL_LIMIT) {
              fabContainer.classList.add('hidden'); // Скрываем кнопки добавления, если лимит достигнут
          } else {
              fabContainer.classList.remove('hidden');
          }
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---
    }

    function saveMonthlyPayments() {
      const monthData = getMonthData(currentMonth);
      const advance = parseInt(document.getElementById('pay_advance').value) || 0;
      const salary = parseInt(document.getElementById('pay_salary').value) || 0;
      const bonus = parseInt(document.getElementById('pay_bonus').value) || 0;

      monthData.advance = advance;
      monthData.salary = salary;
      monthData.bonus = bonus;
      
      save();
      
      const totalEl = document.getElementById('total-received-sum');
      if (totalEl) {
        totalEl.textContent = formatMoney(advance + salary + bonus);
      }
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('visible');
      setTimeout(() => { 
        document.getElementById('modal-content').innerHTML = ''; 
        document.body.classList.remove('modal-open');
        window.scrollTo(0, document.body.scrollTop); 
      }, 300);
    }

    function openRateModal() {
      const monthData = getMonthData(currentMonth);
      const html = `
        <h3>Настройка ставки</h3>
        <p style="color:var(--text-sec); font-size:13px; margin-bottom:16px;">Базовая ставка для расчета поездок в этом месяце.</p>
        <div class="input-group">
          <label class="input-label">Ставка (руб)</label>
          <input type="number" id="new_rate" value="${monthData.rate}" inputmode="numeric">
        </div>
        <div class="btn-row">
          <button class="btn-secondary" onclick="closeModal()">Отмена</button>
          <button class="btn-primary" onclick="saveRate()">Сохранить</button>
        </div>
      `;
      document.getElementById('modal-content').innerHTML = html;
      document.getElementById('modal').classList.add('visible');
      document.body.classList.add('modal-open');
    }

    function saveRate() {
      const newRate = parseInt(document.getElementById('new_rate').value);
      if (newRate && newRate > 0) {
        const monthData = getMonthData(currentMonth);
        monthData.rate = newRate;
        save();
        showMonth(currentMonth);
      }
      closeModal();
    }

    function openForm(type, itemId = null) {
      // --- ЛОГИКА LITE-ВЕРСИИ: Проверка лимита перед открытием формы добавления поездки ---
      if (type === 'trip' && !itemId && !isPremium) { // Проверяем только для новых поездок, не для редактирования
          const monthData = getMonthData(currentMonth);
          const tripsInMonth = monthData.items.filter(t => t.type === 'trip').length;
          if (tripsInMonth >= TRIAL_LIMIT) {
              showPremiumModal(); // Показываем модальное окно покупки вместо формы
              return;
          }
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

      const monthData = getMonthData(currentMonth);
      const item = itemId ? monthData.items.find(t => t.id === itemId) : null;
      const isEdit = !!item;
      
      let html = '';
      
      if (type === 'trip') {
        const dayRange = item ? item.dayRange : '';
        const location = item ? item.location : '';
        const km = item && item.km !== null ? item.km : '';
        const stores = item ? item.stores : 0;
        const isWeekend = item ? item.isWeekend : false;
        const nights = item ? item.nights : (isEdit ? 0 : suggestNights(dayRange));

        html = `
          <h3 style="margin-bottom:16px;">${isEdit ? 'Редактировать' : 'Добавить'} поездку</h3>
          <div class="input-group">
            <label class="input-label">Даты (напр. 5 или 5-7)</label>
            <input type="text" id="f_dayRange" value="${dayRange}" placeholder="5-7" inputmode="numeric">
          </div>
          <div class="input-group">
            <label class="input-label">Направление / Город</label>
            <input type="text" id="f_location" value="${location}" placeholder="Москва" autocapitalize="words">
          </div>
          <div class="input-group">
            <label class="input-label">Километры (если < 250, считается как 250)</label>
            <input type="number" id="f_km" value="${km}" placeholder="0" inputmode="decimal">
          </div>
          <div class="input-group">
            <label class="input-label">Точки (магазины)</label>
            <input type="number" id="f_stores" value="${stores}" placeholder="0" inputmode="numeric">
            <div style="font-size:11px; color:var(--text-sec); margin-top:4px; line-height:1.3;">
              Оплата: каждый 2-й магазин с 5-го (5, 7, 9...) по 10% от ставки.
            </div>
          </div>
          
          <div class="toggle-btn ${isWeekend ? 'active' : ''}" id="weekendBtn" onclick="toggleWeekend()">
            <div class="toggle-icon" id="weekendIcon">${isWeekend ? '✔' : ''}</div>
            Выходной (x2)
          </div>
          <input type="hidden" id="f_isWeekend" value="${isWeekend}">

          <div class="input-group">
            <label class="input-label">Ночевки (x${PER_DIEM_RATE}₽)</label>
            <input type="number" id="f_nights" value="${nights}" placeholder="0" inputmode="numeric">
          </div>
          <div class="btn-row">
            <button class="btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn-primary" id="btnSave">Сохранить</button>
          </div>
        `;
      } else {
        const dayRange = item ? item.dayRange : '';
        html = `
          <h3 style="margin-bottom:16px;">${isEdit ? 'Редактировать' : 'Добавить'} выходной</h3>
          <div class="input-group">
            <label class="input-label">Дата (или диапазон, напр. 9-11)</label>
            <input type="text" id="f_dayRange" value="${dayRange}" placeholder="9-11" inputmode="numeric">
          </div>
          <div class="btn-row">
            <button class="btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn-primary" id="btnSave">Сохранить</button>
          </div>
        `;
      }

      const modalContent = document.getElementById('modal-content');
      const modal = document.getElementById('modal');
      
      modalContent.innerHTML = html;
      modal.classList.add('visible');
      document.body.classList.add('modal-open');

      setTimeout(() => {
        const dayInput = document.getElementById('f_dayRange');
        if(dayInput) dayInput.focus();
      }, 350);

      const saveCallback = () => saveForm(type, itemId);
      document.getElementById('btnSave').onclick = saveCallback;
      modalContent.querySelectorAll('input:not([type="hidden"])').forEach(input => {
        input.onkeyup = (e) => { if (e.key === 'Enter') saveCallback(); };
      });
    }

    function toggleWeekend() {
      const btn = document.getElementById('weekendBtn');
      const icon = document.getElementById('weekendIcon');
      const hiddenInput = document.getElementById('f_isWeekend');
      
      if (!btn || !icon || !hiddenInput) return;
      const isActive = btn.classList.contains('active');
      
      if (isActive) {
        btn.classList.remove('active');
        icon.innerHTML = '';
        hiddenInput.value = 'false';
      } else {
        btn.classList.add('active');
        icon.innerHTML = '✔';
        hiddenInput.value = 'true';
      }
    }

    function saveForm(type, itemId) {
      const dayRangeEl = document.getElementById('f_dayRange');
      if (!dayRangeEl) return;
      
      const dayRange = dayRangeEl.value.trim();
      if (!dayRange) {
        alert('Укажите дату');
        return;
      }

      let newItem = {
        id: itemId || Date.now().toString(),
        type: type,
        dayRange: dayRange
      };

      if (type === 'trip') {
        newItem.location = document.getElementById('f_location').value || '—';
        const kmVal = document.getElementById('f_km').value;
        newItem.km = kmVal ? parseInt(kmVal) : null;
        newItem.stores = parseInt(document.getElementById('f_stores').value) || 0;
        newItem.isWeekend = document.getElementById('f_isWeekend').value === 'true';
        newItem.nights = parseInt(document.getElementById('f_nights').value) || 0;
      } else {
        newItem.note = 'Выходной';
      }

      const monthData = getMonthData(currentMonth);
      if (itemId) {
        const idx = monthData.items.findIndex(t => t.id === itemId);
        if (idx !== -1) monthData.items[idx] = newItem;
      } else {
        monthData.items.push(newItem);
      }

      save();
      saveMonthlyPayments();
      closeModal();
      showMonth(currentMonth);
    }

    let deleteId = null;
    function confirmDelete(id) {
      deleteId = id;
      const html = `
        <h3 style="color:var(--danger); margin-bottom:8px;">Удалить запись?</h3>
        <p style="color:var(--text-sec); margin-bottom:16px;">Это действие нельзя будет отменить.</p>
        <div class="btn-row">
          <button class="btn-secondary" onclick="closeModal()">Отмена</button>
          <button class="btn-danger" onclick="executeDelete()">Удалить</button>
        </div>
      `;
      document.getElementById('modal-content').innerHTML = html;
      document.getElementById('modal').classList.add('visible');
      document.body.classList.add('modal-open');
    }

    function executeDelete() {
      if (deleteId && currentMonth) {
        const monthData = getMonthData(currentMonth);
        monthData.items = monthData.items.filter(t => t.id !== deleteId);
        save();
        showMonth(currentMonth);
      }
      closeModal();
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-theme');
      const isDark = document.body.classList.contains('dark-theme');
      localStorage.setItem('dark_theme', isDark);
      renderMonthList();
    }

    function exportData() {
      // --- ЛОГИКА LITE-ВЕРСИИ: Проверка доступа к экспорту ---
      if (!isPremium) {
          alert('Экспорт данных доступен только в полной версии.');
          showPremiumModal();
          return;
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

      if (!checkStorage()) { alert('Нет доступа к хранилищу для экспорта'); return; }
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "salary_backup_" + new Date().toISOString().slice(0,10) + ".json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }

    function triggerImport() {
      // --- ЛОГИКА LITE-ВЕРСИИ: Проверка доступа к импорту ---
      if (!isPremium) {
          alert('Импорт данных доступен только в полной версии.');
          showPremiumModal();
          return;
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---
      document.getElementById('fileInput').click();
    }

    function handleFileImport(input) {
      // --- ЛОГИКА LITE-ВЕРСИИ: Проверка доступа к импорту (дополнительно) ---
      if (!isPremium) {
          alert('Импорт данных доступен только в полной версии.');
          input.value = ''; // Очищаем поле ввода
          showPremiumModal();
          return;
      }
      // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const json = JSON.parse(e.target.result);
          if (confirm('Загрузить бэкап? Текущие данные будут заменены.')) {
            data = json;
            save();
            renderMonthList();
            alert('Данные успешно загружены');
          }
        } catch (err) {
          alert('Ошибка чтения файла');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    // --- ЛОГИКА LITE-ВЕРСИИ: Модальное окно покупки и симуляция покупки ---
    function showPremiumModal() {
        const html = `
            <div class="premium-modal-content">
                <h3>Лимит бесплатной версии</h3>
                <p>В бесплатной версии можно добавить только ${TRIAL_LIMIT} поездки в месяц.</p>
                <p>Получите полную версию для снятия всех ограничений.</p>
                <ul>
                    <li>Безлимитное количество поездок</li>
                    <li>Экспорт/Импорт данных</li>
                </ul>
                <div class="btn-row">
                    <button class="btn-secondary" onclick="closeModal()">Позже</button>
                    <button class="btn-primary" onclick="simulatePurchase()">Купить полную версию</button>
                </div>
            </div>
        `;
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal').classList.add('visible');
        document.body.classList.add('modal-open');
    }

    function simulatePurchase() {
        localStorage.setItem('is_premium', 'true');
        isPremium = true;
        closeModal();

        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 24px; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-weight: 500; z-index: 10000;
            animation: fadeIn 0.5s;
        `;
        toast.innerText = "Поздравляем! Вы разблокировали полную версию.";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);

        updateAppDisplayTitle(); // Обновляем заголовок после покупки
        
        // Перерисовываем текущий месяц или список месяцев для отражения изменений
        if (currentMonth) {
            showMonth(currentMonth);
        } else {
            renderMonthList();
        }
    }
    // --- КОНЕЦ ЛОГИКИ LITE-ВЕРСИИ ---

    // ЖЕСТЫ СМАХИВАНИЯ
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;
      handleSwipe(touchStartX, touchEndX, touchStartY, touchEndY);
    }, {passive: true});

    function handleSwipe(sx, ex, sy, ey) {
      if (!currentMonth) return;
      const diffX = ex - sx;
      const diffY = ey - sy;
      
      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
         if (diffX > 0 && sx < 50) { 
           renderMonthList();
         }
      }
    }

    document.getElementById('modal').onclick = (e) => { 
      if (e.target.id === 'modal') closeModal(); 
    };

    window.addEventListener('load', () => {
      if (localStorage.getItem('dark_theme') === 'true') {
        document.body.classList.add('dark-theme');
      }
      if (!checkStorage()) {
        setTimeout(() => alert('Внимание: LocalStorage недоступен. Данные не будут сохраняться после закрытия вкладки.'), 1000);
      }
      renderMonthList(); // Это вызовет updateAppDisplayTitle для начального отображения заголовка
    });

  </script>
</body>
</html>
